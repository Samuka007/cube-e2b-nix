name: Nix CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    name: Eval flake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 2G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - name: Show flake outputs
        run: nix flake show

      - name: Eval package metadata
        run: |
          nix eval .#packages.x86_64-linux.envd.pname --raw
          nix eval .#packages.x86_64-linux.envd.version --raw
          nix eval .#packages.x86_64-linux.minimalImage.imageName --raw
          nix eval .#packages.x86_64-linux.dataImage.imageName --raw

  build-envd:
    name: Build envd
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 6G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - name: Build envd
        run: nix build -L .#envd

      - name: Smoke test envd metadata flags
        run: |
          ./result/bin/envd -version
          ./result/bin/envd -commit
